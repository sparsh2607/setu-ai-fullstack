name: Setu AI CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install client
        run: npm install
        working-directory: client
      - name: Build client
        run: npm run build
        working-directory: client
      - name: Install server
        run: npm install
        working-directory: server
      - name: Check server starts
        run: node -e "import('./src/app.js').then(()=>console.log('server import ok'))"
        working-directory: server
